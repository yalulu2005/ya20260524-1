<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D YALULU Carousel</title>
  
  <!-- 1. 注入 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- 2. 引入 Tailwind CSS (CDN 脚本版) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 3. 引入 React 和 ReactDOM (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 4. 引入 Babel 用于在浏览器实时编译 JSX (CDN) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 简单的重置，保证占满全屏 */
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>
  <!-- React 的挂载点 -->
  <div id="root"></div>

  <!-- 注意这里 type="text/babel"，告诉 Babel 这是需要编译的 React 代码 -->
  <script type="text/babel">
    // 从全局 React 对象中解构出 Hook
    const { useState, useEffect, useCallback } = React;

    // 替换原先的 lucide-react 图标为内联 SVG 组件
    const ArrowLeft = ({ size = 24, strokeWidth = 2, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m12 19-7-7 7-7"/>
        <path d="M19 12H5"/>
      </svg>
    );

    const ArrowRight = ({ size = 24, strokeWidth = 2, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M5 12h14"/>
        <path d="m12 5 7 7-7 7"/>
      </svg>
    );

    const IMAGES = [
      { src: 'https://raw.githubusercontent.com/yalulu2005/ya20260524-1/main/Henry%403x.png', bg: '#6EB5FF', panel: '#8DC4FF' },
      { src: 'https://raw.githubusercontent.com/yalulu2005/ya20260524-1/main/Anna%403x.png', bg: '#E882B4', panel: '#ED9DC4' },
      { src: 'https://raw.githubusercontent.com/yalulu2005/ya20260524-1/main/Tom%403x.png', bg: '#6BBF7A', panel: '#85CC92' },
      { src: 'https://raw.githubusercontent.com/yalulu2005/ya20260524-1/main/Jerry%403x.png', bg: '#F4845F', panel: '#F79B7F' },
    ];

    function App() {
      const [activeIndex, setActiveIndex] = useState(0);
      const [isAnimating, setIsAnimating] = useState(false);
      const [isMobile, setIsMobile] = useState(false);

      useEffect(() => {
        // 预加载图片
        IMAGES.forEach((img) => {
          const image = new Image();
          image.src = img.src;
        });

        // 移动端响应式检测
        const handleResize = () => {
          setIsMobile(window.innerWidth < 640);
        };
        handleResize(); // 初始检查
        window.addEventListener('resize', handleResize);

        return () => window.removeEventListener('resize', handleResize);
      }, []);

      // 轮播导航逻辑
      const navigate = useCallback((direction) => {
        if (isAnimating) return;
        setIsAnimating(true);
        
        setActiveIndex((prev) => {
          if (direction === 'next') {
            return (prev + 1) % 4;
          } else {
            return (prev + 3) % 4;
          }
        });

        setTimeout(() => {
          setIsAnimating(false);
        }, 650);
      }, [isAnimating]);

      // 计算每个轮播项的样式
      const getRoleStyles = (index) => {
        const center = activeIndex;
        const left = (activeIndex + 3) % 4;
        const right = (activeIndex + 1) % 4;
        const back = (activeIndex + 2) % 4;

        const baseTransition = 'transform 650ms cubic-bezier(0.4,0,0.2,1), filter 650ms cubic-bezier(0.4,0,0.2,1), opacity 650ms cubic-bezier(0.4,0,0.2,1), left 650ms cubic-bezier(0.4,0,0.2,1), bottom 650ms cubic-bezier(0.4,0,0.2,1), height 650ms cubic-bezier(0.4,0,0.2,1)';
        const willChange = 'transform, filter, opacity, left, bottom, height';

        let styles = { transition: baseTransition, willChange };

        if (index === center) {
          styles = {
            ...styles,
            transform: `translateX(-50%) scale(${isMobile ? 1.25 : 1.68})`,
            filter: 'blur(0px)',
            opacity: 1,
            zIndex: 20,
            left: '50%',
            height: isMobile ? '60%' : '92%',
            bottom: isMobile ? '22%' : '0'
          };
        } else if (index === left) {
          styles = {
            ...styles,
            transform: 'translateX(-50%) scale(1)',
            filter: 'blur(2px)',
            opacity: 0.85,
            zIndex: 10,
            left: isMobile ? '20%' : '30%',
            height: isMobile ? '16%' : '28%',
            bottom: isMobile ? '32%' : '12%'
          };
        } else if (index === right) {
          styles = {
            ...styles,
            transform: 'translateX(-50%) scale(1)',
            filter: 'blur(2px)',
            opacity: 0.85,
            zIndex: 10,
            left: isMobile ? '80%' : '70%',
            height: isMobile ? '16%' : '28%',
            bottom: isMobile ? '32%' : '12%'
          };
        } else if (index === back) {
          styles = {
            ...styles,
            transform: 'translateX(-50%) scale(1)',
            filter: 'blur(4px)',
            opacity: 1,
            zIndex: 5,
            left: '50%',
            height: isMobile ? '13%' : '22%',
            bottom: isMobile ? '32%' : '12%'
          };
        }

        return styles;
      };

      // 噪点背景 SVG
      const noiseBg = `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E")`;

      return (
        <div 
          className="relative w-full overflow-hidden"
          style={{ 
            backgroundColor: IMAGES[activeIndex].bg, 
            transition: 'background-color 650ms cubic-bezier(0.4,0,0.2,1)',
            fontFamily: "'Inter', sans-serif"
          }}
        >
          <div className="relative w-full" style={{ height: '100vh', overflow: 'hidden' }}>
            
            {/* 1. Grain overlay */}
            <div 
              className="absolute inset-0 pointer-events-none z-50" 
              style={{ 
                backgroundImage: noiseBg,
                backgroundSize: '200px 200px',
                backgroundRepeat: 'repeat',
                opacity: 0.4
              }} 
            />

            {/* 2. Giant ghost text "3D YALULU" */}
            <div 
              className="absolute inset-x-0 flex items-center justify-center pointer-events-none select-none z-[2]" 
              style={{ top: '18%' }}
            >
              <span 
                className="text-white uppercase whitespace-nowrap"
                style={{ 
                  fontFamily: "'Anton', sans-serif",
                  fontSize: 'clamp(90px, 28vw, 380px)',
                  fontWeight: 900,
                  lineHeight: 1,
                  letterSpacing: '-0.02em',
                  opacity: 1
                }}
              >
                3D YALULU
              </span>
            </div>

            {/* 3. Top-left brand label */}
            <div className="absolute top-6 left-4 sm:left-8 z-[60] text-xs font-semibold uppercase text-white opacity-90 tracking-[0.18em]">
              3D YALULU
            </div>

            {/* 4. Carousel */}
            <div className="absolute inset-0 z-[3]">
              {IMAGES.map((img, idx) => (
                <div 
                  key={idx} 
                  className="absolute"
                  style={{ 
                    aspectRatio: '0.6 / 1',
                    ...getRoleStyles(idx)
                  }}
                >
                  <img 
                    src={img.src} 
                    alt={`Figurine ${idx + 1}`} 
                    className="w-full h-full object-contain object-bottom pointer-events-none" 
                    draggable="false" 
                  />
                </div>
              ))}
            </div>

            {/* 5. Bottom-left text + nav buttons */}
            <div className="absolute bottom-6 left-4 sm:bottom-20 sm:left-24 z-[60] max-w-[320px]">
              <p className="font-bold uppercase mb-2 sm:mb-3 text-base sm:text-[22px] text-white opacity-95 tracking-[0.02em]">
                3D YALULU FIGURINES
              </p>
              <p className="hidden sm:block text-xs sm:text-sm text-white opacity-85 leading-[1.6] mb-4 sm:mb-5">
                The artwork is stunning, shipped fully prepared. The finish is a vision, the 3D craft is flawless. Many thanks! Wishing you the win. Order now.
              </p>
              <div className="flex items-center gap-3 sm:gap-4">
                <button 
                  onClick={() => navigate('prev')}
                  className="w-12 h-12 sm:w-16 sm:h-16 bg-transparent border-2 border-white rounded-full flex items-center justify-center text-white transition-all duration-150 hover:scale-110 hover:bg-white/10"
                  aria-label="Previous figurine"
                >
                  <ArrowLeft size={26} strokeWidth={2.25} />
                </button>
                <button 
                  onClick={() => navigate('next')}
                  className="w-12 h-12 sm:w-16 sm:h-16 bg-transparent border-2 border-white rounded-full flex items-center justify-center text-white transition-all duration-150 hover:scale-110 hover:bg-white/10"
                  aria-label="Next figurine"
                >
                  <ArrowRight size={26} strokeWidth={2.25} />
                </button>
              </div>
            </div>

            {/* 6. Bottom-right link */}
            <a 
              href="#" 
              className="absolute bottom-6 right-4 sm:bottom-20 sm:right-10 z-[60] flex items-center text-white uppercase no-underline transition-opacity duration-200 opacity-90 hover:opacity-100"
              style={{ 
                fontFamily: "'Anton', sans-serif",
                fontSize: 'clamp(20px, 4vw, 56px)',
                fontWeight: 400,
                letterSpacing: '-0.02em',
                lineHeight: 1 
              }}
            >
              DISCOVER IT
              <ArrowRight className="ml-2 sm:ml-4 w-5 h-5 sm:w-8 sm:h-8" strokeWidth={2.25} className="ml-2 sm:ml-4" />
            </a>

          </div>
        </div>
      );
    }

    // 挂载 React 根组件
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
